<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Piu ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: pink;
    }
    h1 {
      margin-top: 100px;
    }
    button {
      padding: 15px 30px;
      font-size: 20px;
      margin: 20px;
      cursor: pointer;
      border-radius: 10px;
    }
    #no {
      position: absolute;
    }
  </style>
</head>
<body>

<h1>Piu, will you please meet me after 25-30 days at any place of your choice for justtttt 10 minutes ? ❤️</h1>

<button onclick="yes()">Yes 💖</button>
<button id="no" onmouseover="move()">No 😜</button>

<script>
function yes() {
  alert("ধন্যবাদ তোকে অনেক… আর দয়া করে এই বাজে fazlamor jnno জন্য রাগ koris না bairagya madam। 😎❤️");
}

function move() {
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;
  document.getElementById("no").style.left = x + "px";
  document.getElementById("no").style.top = y + "px";
}
</script>

</body>
</html>
